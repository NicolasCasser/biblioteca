services:
  postgres:
   image: postgres
   container_name: library_db
   restart: always
   environment:
    POSTGRES_USER: ${DB_USERNAME}
    POSTGRES_PASSWORD: ${DB_PASSWORD}
    POSTGRES_DB: ${DB_NAME}
   ports:
    - '5432:5432'

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: library_api
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - postgres